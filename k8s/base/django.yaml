# =========================================
# Django 구성 전체 개념
# -----------------------------------------
# 이 파일은 Django를 Kubernetes에서 사용하기 위해
# 아래 2가지 리소스를 정의합니다.
#
# 1. Deployment
#    - Django Pod를 생성한다
#    - Django 컨테이너를 실행한다
#    - Pod가 죽으면 다시 만든다
#    - 포트, 실행 명령, 환경변수도 함께 설정한다
#
# 2. Service
#    - 다른 서비스가 Django에 접속할 수 있는
#      내부 주소(django-service)를 제공한다
#
# 즉, 이 파일은
# "Django를 실행하고 / 유지하고 / 내부에서 접속 가능하게 만드는"
# 역할을 한다.
# =========================================

# =========================================
# [1] Django Deployment
# -----------------------------------------
# 역할:
# - review-django:local 이미지를 사용해 Django Pod를 생성한다
# - Pod가 죽으면 다시 생성한다
# - Django가 사용하는 포트(8000)를 연다
# - gunicorn 명령으로 Django 서버를 실행한다
# - ConfigMap / Secret 값을 환경변수로 주입한다
#
# [프로젝트 설정과 반드시 맞아야 하는 부분]
# - DB_HOST          → postgres-service
# - REDIS_URL        → redis://redis-service:6379/0
# - FASTAPI_BASE_URL → http://fastapi-service:8001
# - DJANGO_DEBUG / DJANGO_ALLOWED_HOSTS / DJANGO_SECRET_KEY
#   도 ConfigMap / Secret 값과 일치해야 한다
# =========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
  namespace: review-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
        - name: django
          image: review-django:local
          imagePullPolicy: IfNotPresent

          # Django 컨테이너가 내부에서 사용하는 포트
          ports:
            - containerPort: 8000

          # Django 실행 명령
          # 개발 서버가 아니라 gunicorn으로 실행
          command: ["/bin/sh", "-c"]
          args:
            - python manage.py collectstatic --noinput && exec gunicorn mysite.wsgi:application --bind 0.0.0.0:8000

          # -----------------------------
          # 환경변수 설정
          # -----------------------------
          # ConfigMap / Secret 에 저장한 값을
          # Django 컨테이너 안으로 주입한다
          env:
            # Django 기본 설정
            - name: DJANGO_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: DJANGO_DEBUG

            - name: DJANGO_ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: DJANGO_ALLOWED_HOSTS

            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: review-secret
                  key: DJANGO_SECRET_KEY

            # -----------------------------
            # DB 설정
            # -----------------------------
            # PostgreSQL 접속에 필요한 값
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: DB_NAME

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: DB_PORT

            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: review-secret
                  key: DB_PASSWORD

            # -----------------------------
            # Redis 설정
            # -----------------------------
            # Celery / Cache 용 Redis 접속 주소
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: REDIS_URL

            # -----------------------------
            # FastAPI 설정
            # -----------------------------
            # Django가 FastAPI를 호출할 때 사용할 주소
            - name: FASTAPI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: FASTAPI_BASE_URL

            - name: SECURE_SSL_REDIRECT # HTTP → HTTPS로 강제 리다이렉트 여부 설정
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: SECURE_SSL_REDIRECT

            - name: CSRF_TRUSTED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: review-config
                  key: CSRF_TRUSTED_ORIGINS

            # 타임존 설정
            - name: TZ
              value: Asia/Seoul

---
# =========================================
# [2] Django Service
# -----------------------------------------
# 역할:
# - 다른 서비스가 Django에 접근할 수 있는
#   내부 주소(django-service)를 만든다
#
# 핵심 주소:
# - http://django-service:8000
#
# type: ClusterIP
# - 클러스터 내부에서만 접근 가능
# - 외부 브라우저 접근용이 아니라 내부 통신용 서비스
# =========================================
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: review-k8s
spec:
  selector:
    app: django
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

