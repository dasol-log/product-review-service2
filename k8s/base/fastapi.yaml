# =========================================
# FastAPI 구성 전체 개념
# -----------------------------------------
# 이 파일은 FastAPI를 Kubernetes에서 사용하기 위해
# 아래 2가지 리소스를 정의합니다.
#
# 1. Deployment
#    - FastAPI Pod를 생성한다
#    - FastAPI 컨테이너를 실행한다
#    - Pod가 죽으면 다시 만든다
#    - 포트, 리소스, 상태 확인(Probe)도 함께 설정한다
#
# 2. Service
#    - Django가 FastAPI에 접속할 수 있는
#      내부 주소(fastapi-service)를 제공한다
#
# 즉, 이 파일은
# "FastAPI를 실행하고 / 유지하고 / 내부에서 접속 가능하게 만드는"
# 역할을 한다.
# =========================================

# =========================================
# [1] FastAPI Deployment
# -----------------------------------------
# 역할:
# - review-fastapi:local 이미지를 사용해 FastAPI Pod를 생성한다
# - Pod가 죽으면 다시 생성한다
# - FastAPI가 사용하는 포트(8001)를 연다
# - 리소스 사용량을 제한한다
# - readiness/liveness probe로 상태를 확인한다
#
# [프로젝트 설정과 반드시 맞아야 하는 부분]
# - Django는 FASTAPI_BASE_URL 값을 읽어서 FastAPI를 호출한다
# - Kubernetes에서는 보통 ConfigMap에서 아래처럼 맞춘다
#   FASTAPI_BASE_URL=http://fastapi-service:8001
# =========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: review-k8s
  labels:
    app: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: review-fastapi:local
          imagePullPolicy: IfNotPresent

          # FastAPI 컨테이너가 내부에서 사용하는 포트
          ports:
            - containerPort: 8001

          # -----------------------------
          # 환경 설정
          # -----------------------------
          # FastAPI 자체에서 직접 쓰지 않더라도
          # 운영 시 시간대 통일을 위해 넣어둔다
          env:
            - name: TZ
              value: Asia/Seoul

          # -----------------------------
          # 리소스 설정
          # -----------------------------
          # requests: 최소 보장 자원
          # limits: 최대 사용 가능 자원
          # FastAPI가 너무 많은 CPU/메모리를 쓰지 않도록 제한
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # -----------------------------
          # readinessProbe
          # -----------------------------
          # FastAPI가 요청을 받아도 되는 준비 상태인지 확인
          # 준비되지 않았으면 Service 연결 대상에서 제외됨
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6

          # -----------------------------
          # livenessProbe
          # -----------------------------
          # FastAPI가 살아있는지 확인
          # 문제가 있으면 Kubernetes가 컨테이너를 재시작함
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6

---
# =========================================
# [2] FastAPI Service
# -----------------------------------------
# 역할:
# - Django가 FastAPI에 접근할 수 있는
#   내부 주소(fastapi-service)를 만든다
#
# settings.py / ConfigMap 과 연결되는 핵심 주소:
# FASTAPI_BASE_URL = http://fastapi-service:8001
#
# type: ClusterIP
# - 클러스터 내부에서만 접근 가능
# - 외부 브라우저 접근용이 아니라 내부 통신용 서비스
# =========================================
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: review-k8s
  labels:
    app: fastapi
spec:
  type: ClusterIP
  selector:
    app: fastapi
  ports:
    - name: http
      port: 8001
      targetPort: 8001