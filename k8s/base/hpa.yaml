apiVersion: autoscaling/v2  
kind: HorizontalPodAutoscaler  
metadata:  
  name: django-hpa
  namespace: review-k8s  
spec:  
  scaleTargetRef:  
    apiVersion: apps/v1  
    kind: Deployment  
    name: django  
  minReplicas: 1  
  maxReplicas: 3  
  metrics:  
    - type: Resource  
      resource:  
        name: cpu  
        target:  
          type: Utilization  
          averageUtilization: 50