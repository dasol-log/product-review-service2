# =========================================
# Redis 구성 전체 개념
# -----------------------------------------
# 이 파일은 Redis를 Kubernetes에서 사용하기 위해
# 아래 2가지 리소스를 정의합니다.
#
# 1. Deployment
#    - Redis Pod를 생성한다
#    - Redis 컨테이너를 실행한다
#    - Pod가 죽으면 다시 만든다
#    - 상태 확인(Probe)과 리소스 제한도 함께 설정한다
#
# 2. Service
#    - Django / Celery가 Redis에 접속할 수 있는
#      내부 주소(redis-service)를 제공한다
#
# 즉, 이 파일은
# "Redis를 실행하고 / 유지하고 / 내부에서 접속 가능하게 만드는"
# 역할을 한다.
# =========================================

# =========================================
# [1] Redis Deployment
# -----------------------------------------
# 역할:
# - redis:7 이미지를 사용해 Redis Pod를 생성한다
# - Pod가 죽으면 다시 생성한다
# - 리소스 사용량을 제한한다
# - readiness/liveness probe로 상태를 확인한다
# =========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: review-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7

          # Redis가 컨테이너 내부에서 사용하는 포트
          ports:
            - containerPort: 6379

          # -----------------------------
          # 리소스 설정
          # -----------------------------
          # requests: 최소 보장 자원
          # limits: 최대 사용 가능 자원
          # Redis가 너무 많은 CPU/메모리를 쓰지 않도록 제한
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # -----------------------------
          # readinessProbe
          # -----------------------------
          # Redis가 요청을 받아도 되는 준비 상태인지 확인
          # 준비되지 않았으면 Service 연결 대상에서 제외됨
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5

          # -----------------------------
          # livenessProbe
          # -----------------------------
          # Redis가 살아있는지 확인
          # 문제가 있으면 Kubernetes가 컨테이너를 재시작함
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10

---
# =========================================
# [2] Redis Service
# -----------------------------------------
# 역할:
# - Django / Celery가 Redis에 접근할 수 있는
#   내부 주소(redis-service)를 만든다
#
# settings.py / ConfigMap 과 연결되는 핵심 주소:
# REDIS_URL = redis://redis-service:6379/0
#
# type: ClusterIP
# - 클러스터 내부에서만 접근 가능
# - 외부 브라우저 접근용이 아니라 내부 통신용 서비스
# =========================================
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: review-k8s
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379